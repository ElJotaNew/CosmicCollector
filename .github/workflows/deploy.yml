    steps:
      - name: 🚚 Obteniendo el código más reciente
        uses: actions/checkout@v4

      - name: 🛠️ Configurando Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          # Si el package.json está en una subcarpeta, pon la ruta aquí:
          cache-dependency-path: './CosmicCollector/package-lock.json' 

      - name: 📦 Instalando dependencias
        working-directory: ./CosmicCollector # <--- CAMBIA ESTO por el nombre de tu carpeta
        run: npm install

      - name: 🏗️ Construyendo la aplicación
        working-directory: ./CosmicCollector # <--- CAMBIA ESTO también
        run: npm run build

      - name: 📂 Sincronizando archivos via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftp-repoclase.alwaysdata.net
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./CosmicCollector/dist/ # <--- Y ESTO
          server-dir: www/
          protocol: ftps
